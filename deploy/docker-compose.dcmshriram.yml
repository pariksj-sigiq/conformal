services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    image: dcmshriram-conformal:latest
    container_name: partner-dcmshriram
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_TELEMETRY_DISABLED: "1"
    expose:
      - "3000"
    restart: unless-stopped
    networks:
      - cutcompanion_default

networks:
  cutcompanion_default:
    external: true
